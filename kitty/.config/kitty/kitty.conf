# BEGIN_KITTY_FONTS

font_family      auto
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size        14.0

# END_KITTY_FONTS

# BEGIN_KITTY_THEME
# Adwaita darker
include current-theme.conf
# END_KITTY_THEME

background_opacity 0.8
background_blur 0
window_padding_width 0

cursor_trail 1
enable_audio_bell no
shell_integration no-cursor
sync_to_monitor yes
confirm_os_window_close 0
cursor_shape beam
